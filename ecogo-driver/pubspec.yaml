name: ecogo_driver
description: ECOGO driver app (MVP) — post rides, manage seats, broadcast GPS, chat.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  socket_io_client: ^2.0.3+1
  geolocator: ^12.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
